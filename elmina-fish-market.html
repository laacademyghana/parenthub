
<!DOCTYPE html>
<html>
<head>
    <title>Elmina Fish Market</title>

    <style>
        body {
            margin: 0;
            background: #071f4d;
            font-family: Arial, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #071f4d;
            color: white;
            padding: 10px;
            z-index: 10;
            font-weight: bold;
        }

        .book-area {
            width: 100vw;
            height: 100vh;
            padding-top: 45px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #book {
            width: 90vw;
            height: 85vh;
            position: relative;
            perspective: 2000px;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-origin: left center;
            transition: transform 0.8s ease;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: white;
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        .controls {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            z-index: 20;
        }

        button {
            padding: 12px 20px;
            margin: 5px;
            background: #008c7a;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00a88f;
        }
    </style>
</head>

<body>

    <div class="topbar">Elmina Fish Market</div>

    <div class="book-area">
        <div id="book">
            <div class="page"><img src="elmina1.png"></div>
            <div class="page"><img src="elmina2.png"></div>
            <div class="page"><img src="elmina3.png"></div>
            <div class="page"><img src="elmina4.png"></div>
            <div class="page"><img src="elmina5.png"></div>
            <div class="page"><img src="elmina6.png"></div>
            <div class="page"><img src="elmina7.png"></div>
            <div class="page"><img src="elmina8.png"></div>
            <div class="page"><img src="elmina9.png"></div>
            <div class="page"><img src="elmina10.png"></div>
            <div class="page"><img src="elmina11.png"></div>
            <div class="page"><img src="elmina12.png"></div>
            <div class="page"><img src="elmina13.png"></div>
            <div class="page"><img src="elmina14.png"></div>
            <div class="page"><img src="elmina15.png"></div>
            <div class="page"><img src="elmina16.png"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevPage()">Previous Page</button>
        <button onclick="nextPage()">Next Page</button>
        <button onclick="openFullscreen()">Full Screen</button>
    </div>

    <script>
        const pages = document.querySelectorAll('.page');
        let currentPage = 0;

        pages.forEach((page, index) => {
            page.style.zIndex = pages.length - index;
        });

        function nextPage() {
            if (currentPage < pages.length) {
                pages[currentPage].classList.add('flipped');
                currentPage++;
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                pages[currentPage].classList.remove('flipped');
            }
        }

        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            }
        }

        document.getElementById('book').addEventListener('click', nextPage);
    </script>

</body>
</html>
