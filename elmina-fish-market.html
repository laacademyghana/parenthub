<!DOCTYPE html>
<html>
<head>
    <title>Elmina Fish Market</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <style>
        body {
            margin: 0;
            background: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .book-wrapper {
            width: 100vw;
            height: calc(100vh - 115px);
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }

        #book {
            width: 90vw;
            height: 72vh;
        }

        .page {
            background: white;
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: white;
        }

        .controls {
            height: 105px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: white;
        }

        .round-btn {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: none;
            background: #071f4d;
            color: white;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        .round-btn:hover {
            background: #00a88f;
            transform: scale(1.08);
        }

        .icon {
            font-size: 26px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .big-icon {
            font-size: 34px;
            line-height: 1;
            margin-bottom: 2px;
        }

        @media (max-width: 700px) {
            .book-wrapper {
                height: calc(100vh - 95px);
            }

            #book {
                width: 96vw;
                height: 72vh;
            }

            .controls {
                height: 90px;
                gap: 10px;
            }

            .round-btn {
                width: 66px;
                height: 66px;
                font-size: 9px;
            }

            .icon {
                font-size: 21px;
            }

            .big-icon {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <div class="book-wrapper">
        <div id="book">
            <div class="page"><img src="elmina1.png"></div>
            <div class="page"><img src="elmina2.png"></div>
            <div class="page"><img src="elmina3.png"></div>
            <div class="page"><img src="elmina4.png"></div>
            <div class="page"><img src="elmina5.png"></div>
            <div class="page"><img src="elmina6.png"></div>
            <div class="page"><img src="elmina7.png"></div>
            <div class="page"><img src="elmina8.png"></div>
            <div class="page"><img src="elmina9.png"></div>
            <div class="page"><img src="elmina10.png"></div>
            <div class="page"><img src="elmina11.png"></div>
            <div class="page"><img src="elmina12.png"></div>
            <div class="page"><img src="elmina13.png"></div>
            <div class="page"><img src="elmina14.png"></div>
            <div class="page"><img src="elmina15.png"></div>
            <div class="page"><img src="elmina16.png"></div>
        </div>
    </div>

    <div class="controls">

        <a class="round-btn" href="index.html">
            <span class="icon">⌂</span>
            Home
        </a>

        <button class="round-btn" type="button" onclick="goPrevious()">
            <span class="big-icon">⏮</span>
            Previous
        </button>

        <a class="round-btn" href="storybooks.html">
            <span class="icon">📚</span>
            Book Hub
        </a>

        <button class="round-btn" type="button" onclick="goNext()">
            <span class="big-icon">⏭</span>
            Next
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <script>
        let book;

        window.addEventListener("load", function () {
            book = new St.PageFlip(document.getElementById("book"), {
                width: 1100,
                height: 750,
                size: "stretch",
                minWidth: 280,
                maxWidth: 1500,
                minHeight: 220,
                maxHeight: 950,
                showCover: true,
                usePortrait: true,
                mobileScrollSupport: true,
                flippingTime: 1800,
                drawShadow: true,
                maxShadowOpacity: 0.6,
                startZIndex: 20
            });

            book.loadFromHTML(document.querySelectorAll(".page"));
        });

        function goNext() {
            if (book) {
                book.flipNext();
            }
        }

        function goPrevious() {
            if (book) {
                book.flipPrev();
            }
        }
    </script>

</body>
</html>
