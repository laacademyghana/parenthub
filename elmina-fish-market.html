<!DOCTYPE html>
<html>
<head>
    <title>Elmina Fish Market</title>

    <style>
        body {
            margin: 0;
            background: #071f4d;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: #071f4d;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            font-weight: bold;
        }

        .book-wrapper {
            width: 100vw;
            height: 100vh;
            padding-top: 48px;
            padding-bottom: 70px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #book {
            width: 80vw;
            height: 78vh;
        }

        .page {
            background: white;
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: white;
        }

        .controls {
    position: fixed;
    bottom: 15px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 15px;
    z-index: 60;
}
       button {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: none;
    background: #071f4d;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

button:hover {
    background: #00a88f;
    transform: scale(1.08);
}

        button:hover {
            background: #00a88f;
        }

        .back-home {
            position: fixed;
            top: 12px;
            left: 15px;
            z-index: 80;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <a class="back-home" href="index.html">← Home</a>

    <div class="topbar">Elmina Fish Market</div>

    <div class="book-wrapper">
        <div id="book">
            <div class="page"><img src="elmina1.png"></div>
            <div class="page"><img src="elmina2.png"></div>
            <div class="page"><img src="elmina3.png"></div>
            <div class="page"><img src="elmina4.png"></div>
            <div class="page"><img src="elmina5.png"></div>
            <div class="page"><img src="elmina6.png"></div>
            <div class="page"><img src="elmina7.png"></div>
            <div class="page"><img src="elmina8.png"></div>
            <div class="page"><img src="elmina9.png"></div>
            <div class="page"><img src="elmina10.png"></div>
            <div class="page"><img src="elmina11.png"></div>
            <div class="page"><img src="elmina12.png"></div>
            <div class="page"><img src="elmina13.png"></div>
            <div class="page"><img src="elmina14.png"></div>
            <div class="page"><img src="elmina15.png"></div>
            <div class="page"><img src="elmina16.png"></div>
        </div>
    </div>

   <div class="controls">
    <button onclick="goHome()">Home</button>
    <button onclick="goPrevious()">Previous</button>
    <button onclick="goNext()">Next</button>
    <button onclick="openFullscreen()">Full Screen</button>
</div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <script>
        const book = new St.PageFlip(document.getElementById('book'), {
            width: 700,
            height: 900,
            size: "stretch",
            minWidth: 300,
            maxWidth: 900,
            minHeight: 400,
            maxHeight: 1100,
            showCover: false,
            usePortrait: true,
            mobileScrollSupport: false,
            flippingTime: 1800,
            drawShadow: true,
            maxShadowOpacity: 0.6,
            startZIndex: 20
        });

        book.loadFromHTML(document.querySelectorAll('.page'));

        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            }
        }
    </script>

</body>
</html>
