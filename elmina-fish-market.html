<!DOCTYPE html>
<html>
<head>
    <title>Elmina Fish Market</title>

    <style>
        body {
            margin: 0;
            background: #071f4d;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 45px;
            background: #071f4d;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-weight: bold;
        }

        .book-wrapper {
            width: 100vw;
            height: 100vh;
            padding-top: 45px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #book {
            width: 95vw;
            height: 88vh;
        }

        .page {
            background: white;
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 12px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
        }

        button {
            background: #008c7a;
            color: white;
            border: none;
            padding: 12px 18px;
            margin: 4px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00a88f;
        }
    </style>
</head>

<body>

    <div class="topbar">Elmina Fish Market</div>

    <div class="book-wrapper">
        <div id="book">
            <div class="page"><img src="elmina1.png"></div>
            <div class="page"><img src="elmina2.png"></div>
            <div class="page"><img src="elmina3.png"></div>
            <div class="page"><img src="elmina4.png"></div>
            <div class="page"><img src="elmina5.png"></div>
            <div class="page"><img src="elmina6.png"></div>
            <div class="page"><img src="elmina7.png"></div>
            <div class="page"><img src="elmina8.png"></div>
            <div class="page"><img src="elmina9.png"></div>
            <div class="page"><img src="elmina10.png"></div>
            <div class="page"><img src="elmina11.png"></div>
            <div class="page"><img src="elmina12.png"></div>
            <div class="page"><img src="elmina13.png"></div>
            <div class="page"><img src="elmina14.png"></div>
            <div class="page"><img src="elmina15.png"></div>
            <div class="page"><img src="elmina16.png"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="book.pageFlip().flipPrev()">Previous Page</button>
        <button onclick="book.pageFlip().flipNext()">Next Page</button>
        <button onclick="openFullscreen()">Full Screen</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <script>
        const book = new St.PageFlip(document.getElementById('book'), {
            width: 900,
            height: 650,
            size: "stretch",
            minWidth: 315,
            maxWidth: 1600,
            minHeight: 400,
            maxHeight: 1200,
            showCover: true,
            mobileScrollSupport: false,
            flippingTime: 1400,
          usePortrait: false,
            startZIndex: 20,
            drawShadow: true,
            maxShadowOpacity: 0.5
        });

        book.loadFromHTML(document.querySelectorAll('.page'));

        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            }
        }
    </script>

</body>
</html>
