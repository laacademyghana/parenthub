```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaw Goes to the Hospital | Parent Hub Series</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #0b2a5b;
      text-align: center;
    }

    .reader {
      max-width: 1100px;
      margin: 0 auto;
      padding: 15px;
    }

    .top-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .nav-btn {
      background: #0b2a5b;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .nav-btn:hover {
      background: #008c8c;
    }

    .book-frame {
      width: 100%;
      background: white;
      border-radius: 18px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    #bookPage {
      width: 100%;
      display: block;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .page-count {
      font-weight: bold;
      margin-top: 10px;
      font-size: 18px;
    }

    @media (max-width: 600px) {
      .reader {
        padding: 8px;
      }

      .nav-btn {
        font-size: 14px;
        padding: 10px 15px;
      }

      .controls {
        gap: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="reader">

    <div class="top-buttons">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="book-hub.html">Book Hub</a>
    </div>

    <div class="book-frame">
      <img id="bookPage" src="main/yaw1.png" alt="Yaw Goes to the Hospital page" />
    </div>

    <div class="page-count">
      Page <span id="currentPage">1</span> of 20
    </div>

    <div class="controls">
      <button class="nav-btn" onclick="previousPage()">Previous</button>
      <button class="nav-btn" onclick="nextPage()">Next</button>
    </div>

  </div>

  <audio id="pageSound" src="page.mp3" preload="auto"></audio>

  <script>
    const totalPages = 20;
    let currentPage = 1;

    const bookPage = document.getElementById("bookPage");
    const currentPageText = document.getElementById("currentPage");
    const pageSound = document.getElementById("pageSound");

    function playSound() {
      pageSound.currentTime = 0;
      pageSound.play().catch(() => {});
    }

    function updatePage() {
      bookPage.src = `main/yaw${currentPage}.png`;
      currentPageText.textContent = currentPage;
      playSound();
    }

    function nextPage() {
      if (currentPage < totalPages) {
        currentPage++;
        updatePage();
      }
    }

    function previousPage() {
      if (currentPage > 1) {
        currentPage--;
        updatePage();
      }
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowRight") nextPage();
      if (event.key === "ArrowLeft") previousPage();
    });
  </script>
</body>
</html>
