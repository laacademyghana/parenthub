<!DOCTYPE html>
<html>
<head>
    <title>Ananse and the Greedy Friend</title>

    <style>
        body {
            margin: 0;
            background: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .book-hub-banner {
            width: 100%;
            height: 65px;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .book-wrapper {
            width: 100vw;
            height: calc(100vh - 150px);
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }

        #book {
            width: 92vw;
            height: 76vh;
        }

        .page {
            background: white;
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: white;
        }

        .controls {
            height: 85px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 35px;
            background: white;
        }

        button {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: none;
            background: #071f4d;
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        }

        button:hover {
            background: #00a88f;
            transform: scale(1.08);
        }

        .arrow {
            font-size: 26px;
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <img src="book-hub-banner.png.png" alt="Book Hub Banner" class="book-hub-banner">

    <div class="book-wrapper">
        <div id="book">
            <div class="page"><img src="Ananse 1.png"></div>
            <div class="page"><img src="Ananse 2.png"></div>
            <div class="page"><img src="Ananse 3.png"></div>
            <div class="page"><img src="Ananse 4.png"></div>
            <div class="page"><img src="Ananse 5.png"></div>
            <div class="page"><img src="Ananse 6.png"></div>
            <div class="page"><img src="Ananse 7.png"></div>
            <div class="page"><img src="Ananse 8.png"></div>
            <div class="page"><img src="Ananse 9.png"></div>
            <div class="page"><img src="Ananse 10.png"></div>
            <div class="page"><img src="Ananse 11.png"></div>
            <div class="page"><img src="Ananse 12.png"></div>
            <div class="page"><img src="Ananse 13.png"></div>
            <div class="page"><img src="Ananse 14.png"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="goParentHub()">
            <span class="arrow">⌂</span>
            Parent
        </button>

        <button onclick="goPrevious()">
            <span class="arrow">←</span>
            Previous
        </button>

        <button onclick="goBookHub()">
            <span class="arrow">📚</span>
            Book Hub
        </button>

        <button onclick="goNext()">
            <span class="arrow">→</span>
            Next
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <script>
        const book = new St.PageFlip(document.getElementById('book'), {
            width: 1100,
            height: 750,
            size: "stretch",
            minWidth: 300,
            maxWidth: 1600,
            minHeight: 300,
            maxHeight: 1000,
            showCover: false,
            usePortrait: false,
            mobileScrollSupport: false,
            flippingTime: 1800,
            drawShadow: true,
            maxShadowOpacity: 0.6,
            startZIndex: 20
        });

        book.loadFromHTML(document.querySelectorAll('.page'));

        function goNext() {
            book.flipNext();
        }

        function goPrevious() {
            book.flipPrev();
        }

        function goParentHub() {
            window.location.href = "index.html";
        }

        function goBookHub() {
            window.location.href = "storybooks.html";
        }
    </script>

</body>
</html>
