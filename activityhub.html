<!DOCTYPE html>
<html>
<head>
    <title>Activity Hub - Little Angels Academy Parent Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff8e8;
            color: #071f4d;
            text-align: center;
        }

        .page {
            min-height: 100vh;
            padding: 18px;
            box-sizing: border-box;
            background: linear-gradient(#fff4d8, #ffffff);
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin: 5px 0;
            color: #071f4d;
        }

        .subtitle {
            display: inline-block;
            background: #008c7a;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 18px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .nav-btn {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: #071f4d;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        }

        .nav-btn:hover {
            background: #00a88f;
        }

        .nav-icon {
            font-size: 26px;
            margin-bottom: 3px;
        }

        .difficulty-buttons {
            margin: 10px 0 22px;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            border: none;
            border-radius: 25px;
            padding: 14px 24px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.22);
        }

        .easy-btn {
            background: #22a947;
        }

        .hard-btn {
            background: #e84393;
        }

        .difficulty-btn.active {
            outline: 5px solid #ffd54f;
        }

        .activity-area {
            display: grid;
            grid-template-columns: 230px minmax(300px, 1fr) 250px;
            gap: 20px;
            max-width: 1200px;
            margin: auto;
            align-items: center;
        }

        .guide {
            background: white;
            border: 4px solid #8a3fc7;
            border-radius: 28px;
            padding: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .guide img {
            width: 100%;
            border-radius: 20px;
            display: block;
        }

        .speech {
            margin-top: 10px;
            font-size: 17px;
            font-weight: bold;
            line-height: 1.4;
        }

        .question-card {
            background: #fffef8;
            border: 6px solid #8a3fc7;
            border-radius: 28px;
            padding: 28px 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.22);
            min-height: 360px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-number {
            background: #8a3fc7;
            color: white;
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 21px;
            font-weight: bold;
            margin: 0 auto 16px;
        }

        .level-label {
            color: #008c7a;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 36px;
            font-weight: bold;
            line-height: 1.25;
            margin-bottom: 22px;
        }

        .answer-input {
            width: 80%;
            max-width: 420px;
            margin: 0 auto 15px;
            padding: 15px;
            font-size: 26px;
            border: 4px solid #071f4d;
            border-radius: 18px;
            text-align: center;
            color: #071f4d;
            font-weight: bold;
        }

        .feedback {
            min-height: 35px;
            font-size: 24px;
            font-weight: bold;
            margin-top: 6px;
        }

        .answer-box {
            display: none;
            background: #dff8ea;
            border: 3px dashed #00a88f;
            border-radius: 18px;
            padding: 12px;
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .action-buttons {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .action-btn {
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            padding: 15px 22px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        }

        .check-btn {
            background: #22a947;
        }

        .show-btn {
            background: #f39c12;
        }

        .next-btn {
            background: #087bdc;
        }

        .side-panel {
            background: #fff8d9;
            border: 4px solid #ffd54f;
            border-radius: 25px;
            padding: 18px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .progress-title {
            font-size: 23px;
            font-weight: bold;
            color: #8a3fc7;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: #eee3c8;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #d5c39b;
        }

        .progress-fill {
            height: 100%;
            width: 5%;
            background: #52c41a;
            border-radius: 20px;
        }

        .progress-count {
            font-size: 22px;
            font-weight: bold;
            margin: 12px 0 20px;
            color: #008c7a;
        }

        .level-box {
            background: white;
            border-radius: 18px;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            color: #071f4d;
            margin-bottom: 14px;
        }

        .encourage {
            background: white;
            border-radius: 18px;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            color: #071f4d;
        }

        @media (max-width: 900px) {
            .activity-area {
                grid-template-columns: 1fr;
            }

            .guide {
                max-width: 240px;
                margin: auto;
            }

            .side-panel {
                max-width: 340px;
                margin: auto;
            }

            .title {
                font-size: 36px;
            }

            .subtitle {
                font-size: 17px;
            }

            .question-text {
                font-size: 28px;
            }

            .answer-input {
                font-size: 22px;
                width: 88%;
            }

            .action-btn {
                font-size: 16px;
                padding: 13px 18px;
            }
        }
    </style>
</head>

<body>

    <div class="page">

        <div class="title">🌟 Activity Hub 🌟</div>
        <div class="subtitle">Let's Learn, Play and Grow!</div>

        <div class="nav-buttons">
            <a class="nav-btn" href="index.html">
                <span class="nav-icon">⌂</span>
                Home
            </a>

            <a class="nav-btn" href="storybooks.html">
                <span class="nav-icon">📚</span>
                Book Hub
            </a>

            <a class="nav-btn" href="tiphub.html">
                <span class="nav-icon">🤝</span>
                Tip Hub
            </a>
        </div>

        <div class="difficulty-buttons">
            <button id="easyButton" class="difficulty-btn easy-btn active" onclick="setDifficulty('easy')">
                Easy: Nursery 2 - KG1
            </button>

            <button id="hardButton" class="difficulty-btn hard-btn" onclick="setDifficulty('hard')">
                Hard: KG2 - Basic 1
            </button>
        </div>

        <div class="activity-area">

            <div class="guide">
                <img src="ama.png" alt="Ama guide character">
                <div class="speech">
                    Hi! I'm Ama.<br>
                    Type your answer and let's learn together!
                </div>
            </div>

            <div>
                <div class="question-card">
                    <div class="question-number" id="questionNumber">Question 1 of 20</div>
                    <div class="level-label" id="levelLabel">Easy Level</div>
                    <div class="question-text" id="questionText">Loading question...</div>

                    <input id="userAnswer" class="answer-input" type="text" placeholder="Type answer here">

                    <div class="feedback" id="feedback"></div>
                    <div class="answer-box" id="answerBox">Answer</div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn check-btn" onclick="checkAnswer()">✅ Check Answer</button>
                    <button class="action-btn show-btn" onclick="showAnswer()">👁 Show Answer</button>
                    <button class="action-btn next-btn" onclick="nextQuestion()">➡ Next Question</button>
                </div>
            </div>

            <div class="side-panel">
                <div class="progress-title">Your Progress</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-count" id="progressCount">1 / 20</div>

                <div class="level-box" id="levelBox">
                    Easy Level<br>
                    Nursery 2 - KG1
                </div>

                <div class="encourage" id="encourageBox">
                    Great job!<br>
                    Keep trying!<br>
                    You are amazing!
                </div>
            </div>

        </div>

    </div>

    <script>
        const easyQuestions = [
            { question: "What is 2 + 1?", answer: "3" },
            { question: "What is 3 + 2?", answer: "5" },
            { question: "What number comes after 5?", answer: "6" },
            { question: "What number comes before 4?", answer: "3" },
            { question: "Which is bigger: 2 or 5?", answer: "5" },
            { question: "Write the first letter of apple.", answer: "a" },
            { question: "Write the first letter of ball.", answer: "b" },
            { question: "What letter comes after A?", answer: "b" },
            { question: "What letter comes after C?", answer: "d" },
            { question: "Spell cat.", answer: "cat" },
            { question: "Spell dog.", answer: "dog" },
            { question: "Fill in the missing letter: c_t", answer: "a" },
            { question: "Fill in the missing letter: d_g", answer: "o" },
            { question: "What is 1 + 1?", answer: "2" },
            { question: "What is 4 + 1?", answer: "5" },
            { question: "What number comes after 9?", answer: "10" },
            { question: "Spell sun.", answer: "sun" },
            { question: "Spell pen.", answer: "pen" },
            { question: "Which is smaller: 8 or 3?", answer: "3" },
            { question: "Write the missing number: 1, 2, __", answer: "3" }
        ];

        const hardQuestions = [
            { question: "What is 7 + 5?", answer: "12" },
            { question: "What is 10 - 3?", answer: "7" },
            { question: "What is 6 + 6?", answer: "12" },
            { question: "What is 15 - 5?", answer: "10" },
            { question: "Count by twos: 2, 4, 6, __", answer: "8" },
            { question: "What number comes after 19?", answer: "20" },
            { question: "Which is bigger: 18 or 12?", answer: "18" },
            { question: "Write the missing number: 5, 10, 15, __", answer: "20" },
            { question: "Spell fish.", answer: "fish" },
            { question: "Spell book.", answer: "book" },
            { question: "Spell school.", answer: "school" },
            { question: "Fill in the missing letters: b__k", answer: "oo" },
            { question: "Fill in the missing letter: f_sh", answer: "i" },
            { question: "Which is correct: school or skool?", answer: "school" },
            { question: "Which is correct: book or buk?", answer: "book" },
            { question: "Write a word that starts with M.", answer: "mum" },
            { question: "What letter comes after M?", answer: "n" },
            { question: "What is 20 - 10?", answer: "10" },
            { question: "What is 8 + 4?", answer: "12" },
            { question: "Spell friend.", answer: "friend" }
        ];

        const encouragements = [
            "Great job!<br>Keep trying!<br>You are amazing!",
            "Fantastic work!<br>You are learning so well!",
            "Well done!<br>Keep going!",
            "Excellent thinking!<br>You can do it!",
            "Super star!<br>Learning is fun!"
        ];

        let difficulty = "easy";
        let currentQuestions = [];
        let currentIndex = 0;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function normalize(text) {
            return text.toLowerCase().trim();
        }

        function setDifficulty(level) {
            difficulty = level;
            document.getElementById("easyButton").classList.remove("active");
            document.getElementById("hardButton").classList.remove("active");

            if (level === "easy") {
                document.getElementById("easyButton").classList.add("active");
                document.getElementById("levelLabel").textContent = "Easy Level";
                document.getElementById("levelBox").innerHTML = "Easy Level<br>Nursery 2 - KG1";
            } else {
                document.getElementById("hardButton").classList.add("active");
                document.getElementById("levelLabel").textContent = "Hard Level";
                document.getElementById("levelBox").innerHTML = "Hard Level<br>KG2 - Basic 1";
            }

            startQuiz();
        }

        function startQuiz() {
            const source = difficulty === "easy" ? easyQuestions : hardQuestions;
            currentQuestions = shuffle([...source]).slice(0, 20);
            currentIndex = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];

            document.getElementById("questionNumber").textContent =
                "Question " + (currentIndex + 1) + " of " + currentQuestions.length;

            document.getElementById("questionText").textContent = q.question;
            document.getElementById("answerBox").style.display = "none";
            document.getElementById("answerBox").textContent = "Answer: " + q.answer;
            document.getElementById("userAnswer").value = "";
            document.getElementById("feedback").textContent = "";

            const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";
            document.getElementById("progressCount").textContent =
                (currentIndex + 1) + " / " + currentQuestions.length;

            document.getElementById("encourageBox").innerHTML =
                encouragements[Math.floor(Math.random() * encouragements.length)];
        }

        function checkAnswer() {
            const userAnswer = normalize(document.getElementById("userAnswer").value);
            const correctAnswer = normalize(currentQuestions[currentIndex].answer);

            if (userAnswer === "") {
                document.getElementById("feedback").textContent = "Type your answer first.";
                document.getElementById("feedback").style.color = "#e67e22";
                return;
            }

            if (userAnswer === correctAnswer) {
                document.getElementById("feedback").textContent = "Correct! Well done!";
                document.getElementById("feedback").style.color = "#22a947";
            } else {
                document.getElementById("feedback").textContent = "Good try! Check again or show the answer.";
                document.getElementById("feedback").style.color = "#e84393";
            }
        }

        function showAnswer() {
            document.getElementById("answerBox").style.display = "block";
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                showQuestion();
            } else {
                document.getElementById("questionText").textContent =
                    "Well done! You finished all the questions!";
                document.getElementById("answerBox").style.display = "block";
                document.getElementById("answerBox").textContent =
                    "You are a superstar!";
                document.getElementById("feedback").textContent = "";
            }
        }

        startQuiz();
    </script>

</body>
</html>
