<!DOCTYPE html>
<html>
<head>
    <title>Tip Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

    <style>
        body {
            margin: 0;
            background: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .book-wrapper {
            width: 100vw;
            height: calc(100vh - 115px);
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }

        #book {
            width: 90vw;
            height: 72vh;
        }

        .page {
            background: white;
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: white;
        }

        .controls {
            height: 105px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: white;
        }

        .round-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            background: #071f4d;
            color: white;
            font-weight: bold;
            font-size: 9px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        .round-btn:hover {
            background: #00a88f;
            transform: scale(1.08);
        }

        .icon {
            font-size: 21px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .big-icon {
            font-size: 28px;
            line-height: 1;
            margin-bottom: 2px;
        }

        #zoomBox {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999999;
            overflow: auto;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
        }

        #zoomImage {
            width: 90%;
            max-width: none;
            height: auto;
        }

        .zoom-note {
            position: fixed;
            top: 10px;
            left: 0;
            right: 0;
            z-index: 10000000;
            color: #071f4d;
            font-size: 14px;
            font-weight: bold;
            background: white;
            padding: 8px;
        }

        @media (max-width: 700px) {
            .book-wrapper {
                height: calc(100vh - 95px);
            }

            #book {
                width: 96vw;
                height: 72vh;
            }

            .controls {
                height: 90px;
                gap: 5px;
            }

            .round-btn {
                width: 60px;
                height: 60px;
                font-size: 8px;
            }

            .icon {
                font-size: 18px;
            }

            .big-icon {
                font-size: 23px;
            }

            #zoomImage {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="book-wrapper">
        <div id="book">
            <div class="page"><img src="phwk1.png"></div>
            <div class="page"><img src="phwk2.png"></div>
            <div class="page"><img src="phwk3.png"></div>
            <div class="page"><img src="phwk4.png"></div>
            <div class="page"><img src="phwk5.png"></div>
            <div class="page"><img src="phwk6.png"></div>
            <div class="page"><img src="phwk7.png"></div>
            <div class="page"><img src="phwk8.png"></div>
            <div class="page"><img src="phwk9.png"></div>
            <div class="page"><img src="phwk10.png"></div>
            <div class="page"><img src="phwk11.png"></div>
            <div class="page"><img src="phwk12.png"></div>
            <div class="page"><img src="phwk13.png"></div>
            <div class="page"><img src="phwk14.png"></div>
            <div class="page"><img src="phwk15.png"></div>
            <div class="page"><img src="phwk16.png"></div>
            <div class="page"><img src="phwk17.png"></div>
            <div class="page"><img src="phwk18.png"></div>
            <div class="page"><img src="phwk19.png"></div>
            <div class="page"><img src="phwk20.png"></div>
            <div class="page"><img src="phwk21.png"></div>
            <div class="page"><img src="phwk22.png"></div>
        </div>
    </div>

    <div class="controls">
        <a class="round-btn" href="index.html">
            <span class="icon">⌂</span>
            Home
        </a>

        <button class="round-btn" type="button" onclick="goPrevious()">
            <span class="big-icon">⏮</span>
            Previous
        </button>

        <button class="round-btn" type="button" onclick="openZoom()">
            <span class="big-icon">🔍</span>
            Zoom
        </button>

        <a class="round-btn" href="index.html">
            <span class="icon">🤝</span>
            Tip Hub
        </a>

        <button class="round-btn" type="button" onclick="goNext()">
            <span class="big-icon">⏭</span>
            Next
        </button>
    </div>

    <div id="zoomBox">
        <div class="zoom-note">Pinch or scroll to zoom. Tap here to close.</div>
        <img id="zoomImage" src="" alt="Zoomed tip page" onclick="closeZoom()">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <script>
        let book;

        const pages = [
            "phwk1.png",
            "phwk2.png",
            "phwk3.png",
            "phwk4.png",
            "phwk5.png",
            "phwk6.png",
            "phwk7.png",
            "phwk8.png",
            "phwk9.png",
            "phwk10.png",
            "phwk11.png",
            "phwk12.png",
            "phwk13.png",
            "phwk14.png",
            "phwk15.png",
            "phwk16.png",
            "phwk17.png",
            "phwk18.png",
            "phwk19.png",
            "phwk20.png",
            "phwk21.png",
            "phwk22.png"
        ];

        window.addEventListener("load", function () {
            book = new St.PageFlip(document.getElementById("book"), {
                width: 1100,
                height: 750,
                size: "stretch",
                minWidth: 280,
                maxWidth: 1500,
                minHeight: 220,
                maxHeight: 950,
                showCover: true,
                usePortrait: true,
                mobileScrollSupport: true,
                flippingTime: 1800,
                drawShadow: true,
                maxShadowOpacity: 0.6
            });

            book.loadFromHTML(document.querySelectorAll(".page"));
        });

        function goNext() {
            if (book) book.flipNext();
        }

        function goPrevious() {
            if (book) book.flipPrev();
        }

        function openZoom() {
            if (!book) return;

            const currentPage = book.getCurrentPageIndex();
            const safePage = Math.max(0, Math.min(currentPage, pages.length - 1));

            document.getElementById("zoomImage").src = pages[safePage];
            document.getElementById("zoomBox").style.display = "block";
        }

        function closeZoom() {
            document.getElementById("zoomBox").style.display = "none";
        }
    </script>

</body>
</html>
