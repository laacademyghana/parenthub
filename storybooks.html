    <script>
        /*
            SOUND FILES NEEDED:
            - levelup.mp3 should be in the same folder as storybooks.html
            - page.mp3 should be in the same folder as yaw-at-hospital.html
        */

        let soundsUnlocked = false;

        const levelUpSound = new Audio("levelup.mp3");
        const pageSound = new Audio("page.mp3");

        levelUpSound.preload = "auto";
        pageSound.preload = "auto";

        function unlockBookHubSounds() {
            if (soundsUnlocked) return;

            soundsUnlocked = true;

            const allSounds = [levelUpSound, pageSound];

            allSounds.forEach(sound => {
                sound.muted = true;
                sound.play()
                    .then(() => {
                        sound.pause();
                        sound.currentTime = 0;
                        sound.muted = false;
                    })
                    .catch(() => {
                        sound.muted = false;
                    });
            });
        }

        function playSound(sound) {
            try {
                const freshSound = sound.cloneNode(true);
                freshSound.currentTime = 0;
                freshSound.play().catch(() => {});
            } catch (error) {}
        }

        function openBookWithSound(event, bookUrl) {
            event.preventDefault();

            unlockBookHubSounds();

            playSound(levelUpSound);

            sessionStorage.setItem("parentHubPageSound", "page.mp3");

            setTimeout(() => {
                window.location.href = bookUrl;
            }, 500);
        }

        document.addEventListener("click", unlockBookHubSounds, { once: false });
        document.addEventListener("touchstart", unlockBookHubSounds, { once: false });

        document.querySelectorAll(".book").forEach(book => {
            const bookUrl = book.getAttribute("href");

            book.addEventListener("click", function(event) {
                openBookWithSound(event, bookUrl);
            });
        });
    </script>
