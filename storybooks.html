<!DOCTYPE html>
<html>
<head>
    <title>Book Hub - Little Angels Academy Parent Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7fffd;
            text-align: center;
            color: #071f4d;
        }

        .banner {
            width: 100%;
            height: auto;
            display: block;
        }

        .intro {
            padding: 20px;
        }

        .intro h1 {
            color: #071f4d;
            margin-bottom: 10px;
        }

        .intro p {
            font-size: 18px;
            max-width: 800px;
            margin: auto;
        }

        .books {
            padding: 30px;
        }

        .book {
            display: inline-block;
            width: 250px;
            margin: 20px;
            text-decoration: none;
            color: #071f4d;
        }

        .book img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
            transition: 0.3s;
        }

        .book img:hover {
            transform: scale(1.05);
        }

        .book-title {
            margin-top: 12px;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <img src="book-hub-banner.png.png"
         alt="Book Hub Banner"
         class="banner">

    <div class="intro">

        <h1>Book Hub</h1>

        <p>
            Explore engaging children's storybooks created to inspire reading,
            imagination, language development and a love of learning.
        </p>

    </div>

    <div class="books">

        <a class="book" href="elmina-fish-market.html">
            <img src="elmina1.png" alt="Elmina Fish Market">
            <div class="book-title">Elmina Fish Market</div>
        </a>

        <a class="book" href="#">
            <img src="counting1.png" alt="Counting Book">
            <div class="book-title">Counting Book</div>
        </a>

        <a class="book" href="#">
            <img src="ananse1.png" alt="Ananse and the Greedy Friend">
            <div class="book-title">Ananse and the Greedy Friend</div>
        </a>

    </div>

</body>
</html>
