<!DOCTYPE html>
<html>
<head>
    <title>Book Hub - Little Angels Academy Parent Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7fffd;
            text-align: center;
            color: #071f4d;
        }

        .banner {
            width: 100%;
            height: auto;
            display: block;
        }

        .welcome-text {
            font-size: 42px;
            font-weight: bold;
            color: #071f4d;
            margin-top: 20px;
            margin-bottom: 15px;
            font-family: "Trebuchet MS", Arial, sans-serif;
        }

        .nav-buttons {
            padding: 20px 10px 10px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .round-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #071f4d;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        .round-btn:hover {
            background: #00a88f;
            transform: scale(1.08);
        }

        .icon {
            font-size: 30px;
            margin-top: 6px;
            line-height: 1;
        }

        .nav-icon-img {
            width: 62px;
            height: 62px;
            object-fit: contain;
            display: block;
        }

        .books {
            padding: 35px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .book {
            width: 560px;
            max-width: 92%;
            text-decoration: none;
            color: #071f4d;
            cursor: pointer;
        }

        .book img {
            width: 100%;
            height: auto;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            background: white;
            display: block;
        }

        .book img:hover {
            transform: scale(1.03);
        }

        .motto {
            margin-top: 35px;
            margin-bottom: 40px;
            font-size: 22px;
            font-weight: bold;
            color: #008c7a;
        }

        @media (max-width: 700px) {
            .welcome-text {
                font-size: 30px;
                padding: 0 15px;
            }

            .nav-buttons {
                gap: 12px;
            }

            .round-btn {
                width: 75px;
                height: 75px;
                font-size: 10px;
            }

            .icon {
                font-size: 24px;
            }

            .nav-icon-img {
                width: 56px;
                height: 56px;
            }

            .books {
                gap: 28px;
                padding: 25px 10px;
            }

            .book {
                width: 96%;
            }

            .motto {
                font-size: 18px;
                padding: 0 15px;
            }
        }
    </style>
</head>

<body>

    <img src="book-hub-banner.png.png" alt="Book Hub Banner" class="banner">

    <div class="welcome-text">Click on a book to read it!</div>

    <div class="nav-buttons">
        <a class="round-btn" href="index.html">
            Home
            <img src="home-icon.png" class="nav-icon-img" alt="Home">
        </a>

        <a class="round-btn" href="storybooks.html">
            Book Hub
            <span class="icon">📚</span>
        </a>

        <a class="round-btn" href="tiphub.html">
            Tip Hub
            <span class="icon">🤝</span>
        </a>

        <a class="round-btn" href="activityhub.html">
            Activity Hub
            <span class="icon">🎮</span>
        </a>
    </div>

    <div class="books">

        <a class="book" href="elmina-fish-market.html">
            <img src="elmina1.png" alt="Elmina Fish Market">
        </a>

        <a class="book" href="counting-book.html">
            <img src="counting1.png" alt="Counting Book">
        </a>

        <a class="book" href="ananse-book.html">
            <img src="Ananse%201.png" alt="Ananse and the Greedy Friend">
        </a>

        <a class="book" href="yaw-at-hospital.html">
            <img src="yaw1.png" alt="Yaw Goes to the Hospital">
        </a>

    </div>

    <div class="motto">
        Nurturing hearts. Building minds. Shaping the future.
    </div>

    <script>
        const SOUND_VOLUME = 0.25;

        const levelUpSound = new Audio("levelup.mp3");
        levelUpSound.preload = "auto";
        levelUpSound.volume = SOUND_VOLUME;

        function playLevelUpAndOpen(bookUrl) {
            const sound = new Audio("levelup.mp3");
            sound.volume = SOUND_VOLUME;

            sound.play().catch(() => {
                window.location.href = bookUrl;
            });

            setTimeout(() => {
                window.location.href = bookUrl;
            }, 450);
        }

        document.querySelectorAll(".book").forEach(book => {
            book.addEventListener("click", function(event) {
                event.preventDefault();

                const bookUrl = this.getAttribute("href");

                sessionStorage.setItem("parentHubPageSound", "page.mp3");
                sessionStorage.setItem("parentHubSoundVolume", SOUND_VOLUME);

                playLevelUpAndOpen(bookUrl);
            });
        });
    </script>

</body>
</html>
