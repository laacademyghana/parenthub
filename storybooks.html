<!DOCTYPE html>
<html>
<head>
    <title>Book Hub - Little Angels Academy Parent Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7fffd;
            text-align: center;
            color: #071f4d;
        }

        .banner {
            width: 100%;
            height: auto;
            display: block;
        }

        .books {
            padding: 40px 20px;
        }

        .book {
            display: inline-block;
            width: 260px;
            margin: 20px;
            text-decoration: none;
            color: #071f4d;
            vertical-align: top;
        }

        .book img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            background: white;
        }

        .book img:hover {
            transform: scale(1.05);
        }

        .book-title {
            margin-top: 12px;
            font-size: 22px;
            font-weight: bold;
        }

        .motto {
            margin-top: 20px;
            margin-bottom: 40px;
            font-size: 22px;
            font-weight: bold;
            color: #008c7a;
        }
    </style>
</head>

<body>

    <img src="book-hub-banner.png.png" alt="Book Hub Banner" class="banner">

    <div class="books">

        <a class="book" href="elmina-fish-market.html">
            <img src="elmina1.png" alt="Elmina Fish Market">
            <div class="book-title">Elmina Fish Market</div>
        </a>

        <a class="book" href="counting-book.html">
            <img src="counting1.png" alt="Counting">
            <div class="book-title">Counting</div>
        </a>

        <a class="book" href="ananse-book.html">
           <img src="Ananse%201.png" alt="Ananse and the Greedy Friend">
            <div class="book-title">Ananse and the Greedy Friend</div>
        </a>

    </div>

    <div class="motto">
        Nurturing hearts. Building minds. Shaping the future.
    </div>

</body>
</html>
